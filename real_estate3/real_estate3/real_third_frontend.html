<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TMCars Real Estate Parser UI</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --text: #1b2330;
      --muted: #5b687a;
      --accent: #0f766e;
      --accent-2: #115e59;
      --danger: #b42318;
      --border: #d8dee8;
      --shadow: 0 12px 30px rgba(10, 20, 40, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Inter", "SF Pro Text", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, #d7f4ef 0%, transparent 45%),
        radial-gradient(circle at 90% 20%, #dbe7ff 0%, transparent 40%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1120px;
      margin: 36px auto;
      padding: 0 16px 40px;
    }

    .header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .controls {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
    }

    input, button, select {
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #7fb8af;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: transform .08s ease, background .2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-2); }

    .btn-secondary {
      background: #fff;
      color: var(--text);
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: rise .2s ease;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .pill {
      display: inline-block;
      background: #e9f8f5;
      color: #0f4f49;
      border-radius: 999px;
      font-size: 12px;
      padding: 5px 9px;
      font-weight: 600;
    }

    .price {
      font-size: 20px;
      font-weight: 700;
      color: #133f73;
    }

    .desc {
      color: #2f3b4b;
      line-height: 1.45;
      font-size: 14px;
      white-space: pre-line;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
    }

    .label { color: var(--muted); }
    .err { color: var(--danger); font-weight: 600; }

    .empty {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 24px;
      text-align: center;
      background: #fff;
    }

    @media (max-width: 860px) {
      .controls { grid-template-columns: 1fr; }
      .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="header">
      <h1 class="title">TMCars Real Estate Web Service</h1>
      <p class="subtitle">Интерфейс для просмотра данных парсера `real_third.py`</p>

      <div class="controls">
        <input id="endpoint" value="/api/real_third" placeholder="URL API endpoint" />
        <button class="btn-primary" id="loadApi">Загрузить из API</button>
        <button class="btn-secondary" id="loadJson">Загрузить real_third.json</button>
        <button class="btn-secondary" id="clear">Очистить</button>
      </div>
    </section>

    <div class="topbar">
      <div class="meta" id="meta">Объявлений: 0</div>
      <input id="search" placeholder="Поиск по названию, локации, телефону" />
    </div>

    <div id="status" class="meta"></div>
    <div id="list" class="grid"></div>
  </div>

  <script>
    const state = { items: [], filtered: [] };
    const listEl = document.getElementById("list");
    const metaEl = document.getElementById("meta");
    const statusEl = document.getElementById("status");
    const endpointEl = document.getElementById("endpoint");
    const searchEl = document.getElementById("search");

    function setStatus(text, isError = false) {
      statusEl.textContent = text || "";
      statusEl.className = isError ? "err" : "meta";
    }

    function normalize(v) {
      return String(v || "").toLowerCase();
    }

    function render() {
      metaEl.textContent = `Объявлений: ${state.filtered.length}`;
      if (!state.filtered.length) {
        listEl.innerHTML = '<div class="empty">Ничего не найдено. Попробуйте другой фильтр или источник данных.</div>';
        return;
      }

      listEl.innerHTML = state.filtered.map(item => `
        <article class="card">
          <h3 class="card-title">${escapeHtml(item.title || "Без названия")}</h3>
          <div class="row">
            <span class="pill">${escapeHtml(item.time_to_paste || "нет времени")}</span>
            <span>${escapeHtml(item.location || "без локации")}</span>
          </div>
          <div class="price">${escapeHtml(item.price || "Цена не указана")}</div>
          <div class="desc">${escapeHtml(item.description || "Описание отсутствует")}</div>
          <div class="row">
            <span class="label">Телефон:</span>
            <strong>${escapeHtml(item.phone || "не найден")}</strong>
          </div>
          <a href="${escapeAttr(item.link || "#")}" target="_blank" rel="noopener noreferrer">Открыть объявление</a>
        </article>
      `).join("");
    }

    function applySearch() {
      const q = normalize(searchEl.value).trim();
      if (!q) state.filtered = [...state.items];
      else {
        state.filtered = state.items.filter(i => {
          const hay = [
            i.title, i.location, i.phone, i.description, i.price, i.time_to_paste
          ].map(normalize).join(" ");
          return hay.includes(q);
        });
      }
      render();
    }

    function setItems(data) {
      if (!Array.isArray(data)) throw new Error("Ответ должен быть массивом JSON");
      state.items = data;
      applySearch();
      setStatus(`Данные загружены: ${new Date().toLocaleString("ru-RU")}`);
    }

    async function loadFromApi() {
      const endpoint = endpointEl.value.trim();
      if (!endpoint) return setStatus("Укажите API endpoint", true);
      setStatus("Загрузка из API...");
      try {
        const res = await fetch(endpoint);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        setItems(data);
      } catch (e) {
        setStatus(`Ошибка API: ${e.message}`, true);
      }
    }

    async function loadLocalJson() {
      setStatus("Загрузка real_third.json...");
      try {
        const res = await fetch("./real_third.json");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        setItems(data);
      } catch (e) {
        setStatus(`Ошибка файла: ${e.message}`, true);
      }
    }

    function clearData() {
      state.items = [];
      state.filtered = [];
      render();
      setStatus("");
    }

    function escapeHtml(v) {
      return String(v)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttr(v) {
      return escapeHtml(v).replaceAll("'", "&#39;");
    }

    document.getElementById("loadApi").addEventListener("click", loadFromApi);
    document.getElementById("loadJson").addEventListener("click", loadLocalJson);
    document.getElementById("clear").addEventListener("click", clearData);
    searchEl.addEventListener("input", applySearch);

    render();
  </script>
</body>
</html>
